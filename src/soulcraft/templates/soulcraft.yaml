# Soulcraft Configuration

# For anthropic, set ANTHROPIC_API_KEY env var
# For vertex, set VERTEX_CREDENTIALS env var (base64-encoded service account JSON)
provider: anthropic
base_url: http://localhost:7777 # Optional: custom base URL for anthropic provider

# Models
# The thing to evaluate
target_model: claude-opus-4-6
# The scorer of the transcripts
judge_model: claude-sonnet-4-6
# The human simulator
evaluator_model: claude-opus-4-6
# The scenario generator
ideation_model: claude-sonnet-4-6
# Model for simulating tool responses
tool_simulation_model: claude-haiku-4-5-20251001

# Paths (relative to this file)
prompt: prompt.md

# Bloom ideation settings
# Controls how test scenarios are generated
ideation:
  total_evals: 10 # Number of scenarios to generate
  diversity: 0.8 # 0-1, higher = more varied scenarios

# Bloom rollout settings
# Controls the evaluation conversations
rollout:
  max_turns: 5 # Turns per conversation
  use_fixed_target_prompt: true # Use prompt.md as-is (recommended for prompt development)
  target_reasoning_effort: medium # Extended thinking for target: none, low, medium, high
  evaluator_reasoning_effort: medium # Extended thinking for evaluator: none, low, medium, high
  max_concurrent: 5 # Max parallel examples in last-turn eval
  # Custom evaluator prompts (paths relative to this file)
  # Remove or comment out to use Bloom's defaults
  evaluator_system_prompt: prompts/evaluator.md # Who the evaluator becomes
  scenario_context_template: prompts/scenario-context.md # How scenarios are presented
  target_response_format: prompts/target-response.md # How target responses are shown to the evaluator

# Bloom judgment settings
# What dimensions to score beyond the main behavior
judgment:
  max_concurrent: 10
  additional_qualities: []
