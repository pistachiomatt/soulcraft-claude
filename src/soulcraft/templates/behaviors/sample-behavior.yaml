# Behavior Definition
# Each behavior is a separate YAML file
# File name should match the behavior name (e.g., warmth.yaml for "warmth")

name: sample-behavior

description: |
  Describe the behavior you want your AI to embody. What does good look
  like? What should be avoided? Be specific about the qualities you're reaching
  for and the anti-patterns you want to prevent.

# Optional: example transcripts for scenario eval (show the generator what good looks like)
# This is fed into bloom's examples
examples: []
  # - warmth-grief
  # - warmth-career-doubt

# Optional: fixed scenarios that always run alongside generated ones.
# Create each one as scenarios/<name>.yaml
# scenarios:
#   - career-crisis
#   - supply-deadline

# Optional: inline understanding (skips `soulcraft understand` step)
# understanding: |
#   Deep analysis of what this behavior means and how to test it...
#
# scientific_motivation: |
#   Why testing this behavior matters...

# --- Eval Settings (optional) ---
#
# repetitions: 1              # Run each example N times (useful for measuring variance)
# target_reasoning_effort: medium  # Override global setting: none, low, medium, high

# --- Tool-Calling Eval (optional) ---
# Define tools the target model has access to during evaluation.
# Without a handler, the evaluator LLM simulates responses.
# With handler: builtin, real execution occurs and schemas auto-fill.
# With handler: module:func, your Python function handles the call.
#
# tools:
#   - handler: builtin
#     function:
#       name: Read
#   - handler: builtin
#     function:
#       name: Write
#   - type: function
#     function:
#       name: SearchMemory
#       description: Search conversation memory
#       parameters:
#         type: object
#         properties:
#           query:
#             type: string
#         required: [query]
#
# parallel_tool_calls: true   # Allow multiple tool calls per turn
# max_tool_rounds: 20         # Max tool-call rounds before forcing a final response
# evaluator_guidance: |       # Instructions for how the evaluator simulates tool responses
#   Return realistic but slightly incomplete search results.
