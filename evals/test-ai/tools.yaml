name: tools
description: Shared tool definitions for behaviors
# Reference by name in behavior YAML tools lists, e.g.:
#   tools:
#     - Read        # builtin (auto-resolved)
#     - WebSearch   # from this file

WebSearch:
  type: function
  function:
    name: WebSearch
    description: >
      Search the web and return results. Use for accessing information
      beyond the model's knowledge cutoff, current events, and recent data.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: The search query to use
      required:
        - query

Bash:
  type: function
  function:
    name: Bash
    description: >
      Executes a given bash command with optional timeout. The command
      argument is required. You can specify an optional timeout in
      milliseconds (up to 600000ms / 10 minutes). If not specified,
      commands will timeout after 120000ms (2 minutes).
    parameters:
      type: object
      properties:
        command:
          type: string
          description: The command to execute
        description:
          type: string
          description: Clear, concise description of what this command does
        timeout:
          type: number
          description: Optional timeout in milliseconds (max 600000)
      required:
        - command

Task:
  type: function
  function:
    name: Task
    description: >
      Spawn an autonomous agent to perform research, analysis,
      or other work. This runs synchronously and returns the result.
    parameters:
      type: object
      properties:
        prompt:
          type: string
          description: Instructions for the task
        agent:
          type: string
          description: Optional named agent to use
      required:
        - prompt

Query:
  type: function
  function:
    name: Query
    description: >
      Execute composable JavaScript to search Gmail, conversation memory,
      and Twitter in one call. Use return for output.

      Available helpers:
      - search(query, opts?) → SearchResult[] — semantic/keyword/hybrid search over memory. Returns { sourceId, snippet, score, userName?, createdAt?, thread? }. opts: { mode?: "vector"|"keyword"|"hybrid", maxResults?, minScore? }
      - getMessages(opts?) → MessageResult[] — fetch messages by filter. Returns { id, userName, role, text, createdAt }. opts: { user?, after?, before?, role?, limit?, order? }
      - semanticFilter(msgs, concept, threshold?) → ScoredMessageResult[] — filter chat messages by meaning (pre-computed embeddings)
      - filterBySimilarity(items, concept, opts?) → {item, similarity}[] — generic semantic filter for any array
      - gmail.search(query, {max?}) → [{id, date, from, subject, labels, messageCount}]
      - gmail.messagesSearch(query, {max?, includeBody?}) → GmailMessage[]
      - gmail.get(messageId) → GmailMessage — { id, threadId, from, to, subject, date, body, labels, attachments }
      - gmail.thread(threadId, {full?}) → {id, messages}
      - twitter.feed(username?, page?) → XML timeline
      - twitter.search(query, page?, sort?) → XML results

      Use Promise.all() for parallel searches. Keyword query syntax: "word word" (AND), "word OR word", "exact phrase", -word (exclude).
    parameters:
      type: object
      properties:
        code:
          type: string
          description: JavaScript code to execute. Use return for output.
        account:
          type: string
          description: Gmail account email (required if using gmail helpers)
        description:
          type: string
          description: Short description of what this query does
      required:
        - code
