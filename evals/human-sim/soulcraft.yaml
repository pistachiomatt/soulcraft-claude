# Human Sim Eval — testing the evaluator prompt as a target
# The "target" here is the human simulator. We eval whether it produces
# realistic human messages across a full conversation.
#
# The evaluator plays a generic AI assistant — the human sim talks TO it.
# The judge scores the human sim's messages for realism.

provider: anthropic
base_url: http://localhost:7777

# The human sim (being tested)
target_model: claude-opus-4-5
# The AI it talks to
evaluator_model: claude-sonnet-4-6
# The scorer
judge_model: claude-sonnet-4-6

prompt: prompt.md
bloom_data: bloom-data/

default_behavior: human-realism

ideation:
  total_evals: 5
  diversity: 1.0

rollout:
  max_turns: 1
  use_fixed_target_prompt: true
  target_reasoning_effort: medium
  evaluator_reasoning_effort: medium
  max_concurrent: 5

judgment:
  max_concurrent: 10
  additional_qualities: []
